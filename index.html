<!doctype html>
<html lang="pt_BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conversão Kg para Sc</title>
    <!--Style-->
    <link rel="stylesheet" href="style.css" />
    <!--Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Poppins:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#c4623c" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kg para Sc" />
  </head>
  <body>
    <main>
      <h1 class="title">Conversão KG em SC</h1>

      <section class="conversion">
        <form id="conversion">
          <div class="inputGroup">
            <label for="bagKg"
              ><span>Peso(kg)</span><span>Por saca</span></label
            >
            <input
              type="number"
              id="oneBag"
              name="bagKg"
              step="0.1"
              value="60"
              required
            />
          </div>

          <div class="inputGroup">
            <label for="totalKg"><span>Peso(kg)</span><span>Total</span></label>
            <input type="number" id="weightBag" name="totalKg" required />
          </div>

          <button type="submit">CALCULAR</button>
        </form>
      </section>
    </main>

    <section class="result">
      <div
        class="resultContainer"
        role="dialog"
        aria-modal="true"
        aria-label="Resultados do cálculo"
      >
        <div class="totalContainer">
          <div class="backgroundLeft">
            <p>TOTAL</p>
          </div>

          <div class="backgroundRight">
            <div class="values">
              <p id="totalMaster"></p>
            </div>
            <button type="button" class="copy-btn" id="copyTotal" aria-label="Copiar total">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-copy" width="16" height="16"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="icon-check" width="16" height="16"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </button>
          </div>
        </div>

        <p class="percentage">20%</p>

        <div class="resultsContainer">
          <div class="backgroundLeft">
            <p>Patrão</p>
            <p>Meeiro</p>
          </div>

          <div class="backgroundRight">
            <div class="values">
              <p id="twentyPercBoss"></p>
              <p id="twentyPercEmployee"></p>
            </div>
            <button type="button" class="copy-btn" id="copyTwenty" aria-label="Copiar cálculo 20%">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-copy" width="16" height="16"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="icon-check" width="16" height="16"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </button>
          </div>
        </div>

        <p class="percentage">10%</p>

        <div class="resultsContainer">
          <div class="backgroundLeft">
            <p>Patrão</p>
            <p>Meeiro</p>
          </div>

          <div class="backgroundRight">
            <div class="values">
              <p id="tenPercBoss"></p>
              <p id="tenPercEmployee"></p>
            </div>
            <button type="button" class="copy-btn" id="copyTen" aria-label="Copiar cálculo 10%">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-copy" width="16" height="16"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="icon-check" width="16" height="16"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </button>
          </div>
        </div>

        <p class="percentage">Meia</p>

        <div class="resultsContainer">
          <div class="backgroundLeft">
            <p>Patrão</p>
            <p>Meeiro</p>
          </div>

          <div class="backgroundRight">
            <div class="values">
              <p id="fiftyPercentBoss"></p>
              <p id="fiftyPercentEmployee"></p>
            </div>
            <button type="button" class="copy-btn" id="copyMeia" aria-label="Copiar cálculo a Meia">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-copy" width="16" height="16"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="icon-check" width="16" height="16"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </button>
          </div>
        </div>

        <button type="button" id="back">VOLTAR</button>
      </div>
    </section>

    <footer>
      <div class="offeringContainer">
        <p>Todos os direitos reservados ao criador</p>
        <p class="rildo">Rildo Júnior</p>
        <div class="social">
          <a
            href="https://instagram.com/rildo_junior"
            target="_blank"
            rel="noopener noreferrer"
          >
            <img
              src="assets/instagram.svg"
              alt="ícone Instagram"
              width="24"
              height="24"
              loading="lazy"
            />
          </a>
          <a
            href="https://github.com/rildojunior"
            target="_blank"
            rel="noopener noreferrer"
          >
            <img
              src="assets/github.svg"
              alt="ícone github"
              width="24"
              height="24"
              loading="lazy"
            />
          </a>
        </div>
      </div>
    </footer>

    <script src="./scripts.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
      }
    </script>
  </body>
</html>
